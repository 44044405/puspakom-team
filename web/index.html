html,body{height:100%}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(1100px 700px at 8% -10%, #d8e4f2 0%, transparent 55%),
    radial-gradient(1000px 800px at 100% 0%, #e3e2ef 0%, transparent 50%),
    radial-gradient(900px 700px at 60% 120%, #dde9e6 0%, transparent 55%),
    linear-gradient(180deg,#eaeff5,#e3e9f1);

function toISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function parseISO(s){return s?new Date(s+'T00:00:00'):null}
function fmtLong(s){if(!s)return'—';const d=parseISO(s);return String(d.getDate()).padStart(2,'0')+' '+MONFULL[d.getMonth()]+' '+d.getFullYear()}
function fmt(s){if(!s)return'—';const d=parseISO(s);return d.getDate()+'-'+MON[d.getMonth()]+'-'+d.getFullYear()}
function isHol(iso){return !!HOLIDAYS[iso]}
function isWE(d){const x=d.getDay();return x===0||x===6}
function daysUntil(iso){if(!iso)return null;const t=new Date();t.setHours(0,0,0,0);return Math.round((parseISO(iso)-t)/864e5)}
function nowStamp(){const d=new Date();return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function addMonths(iso,m){const d=parseISO(iso);d.setMonth(d.getMonth()+m);return toISO(d)}
function addDays(iso,n){const d=parseISO(iso);d.setDate(d.getDate()+n);return toISO(d)}
function applyAutoReminders(){let ch=false;const today=toISO(new Date());
  DATA.forEach(r=>{
    if(!['CONFIRMED','BOOKED','REMINDER_1'].includes(r.status))return;
    const t1=r.inspectionDate?addDays(r.inspectionDate,-7):null;
    const t2=r.inspectionDate?addDays(r.inspectionDate,-2):null;
    let ns=r.status;
    if(t2&&today>=t2)ns='REMINDER_2';else if(t1&&today>=t1)ns='REMINDER_1';
    if(ns!==r.status&&STATUS_ORDER.indexOf(ns)>STATUS_ORDER.indexOf(r.status)){
      r.history=r.history||[];r.history.push({s:ns,t:nowStamp()+' · auto'});r.status=ns;ch=true;}
  });
  if(ch)save();return ch;}

function hasCapacity(runner,iso,ex){if(!RUNNER_CAP[runner])return true;return DATA.filter(r=>r.id!==ex&&r.runner===runner&&r.inspectionDate===iso).length<RUNNER_CAP[runner]}
function calcInspection(due,runner,ex){if(!due)return'';let d=parseISO(due);d.setDate(d.getDate()-BUFFER_DAYS);
  for(let i=0;i<160;i++){const iso=toISO(d);if(!isWE(d)&&!isHol(iso)&&hasCapacity(runner,iso,ex))return iso;d.setDate(d.getDate()-1);}return toISO(d)}

const KEY='puspakom_dashboard_v2';
let DATA=[],calMonth=new Date().getMonth(),calYear=new Date().getFullYear(),openId=null,CURVIEW='report';
let fltYear=new Date().getFullYear(),fltMonth='all',fltBasis='due',showHold=false,showSales=false,fltCompany='';
let mSortKey=null,mSortDir=1;
function setMSort(key){if(mSortKey===key){mSortDir=-mSortDir}else{mSortKey=key;mSortDir=1}render()}

function mSortVal(r,key){if(key==='charge')return +r.ourCharge||0;if(key==='status')return r.status?STATUS[r.status].l:'';return (r[key]||'')+''}
function applyMSort(rows){if(!mSortKey)return rows;const k=mSortKey,dir=mSortDir;
  return [...rows].sort((a,b)=>{const va=mSortVal(a,k),vb=mSortVal(b,k);
    if(typeof va==='number'||typeof vb==='number')return (va-vb)*dir;
    return (''+va).localeCompare(''+vb)*dir})}

// ---- Supabase shared data layer (Netlify + Supabase version) -----------
// The vehicle records live in one row of the Supabase `app_state` table, so
// the whole team shares one dataset. Personal UI prefs stay in localStorage.
// save() stays synchronous (every call site unchanged) — it debounces a push
// to Supabase with optimistic-concurrency (rev) protection so two people
// saving at once don't clobber each other. Access is gated by Supabase login.
const SUPABASE_URL='https://lxjtwkxgxwojtltfdugj.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_ZoX2XxOdZKAdpQvExq3SpA_ixtWw-db';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let currentRev=0,dirtyPending=false,savingInFlight=false,pollTimer=null;
function migrate(){DATA.forEach(r=>{if(r.status==='REMINDER_SENT')r.status='REMINDER_1';if(RUNNER_MIGRATE[r.runner])r.runner=RUNNER_MIGRATE[r.runner]});}

async function loadFromServer(){
  const {data,error}=await sb.from('app_state').select('rev,data').eq('id',1).single();
  if(error)throw error;
  DATA=Array.isArray(data.data)?data.data:[];
  currentRev=data.rev||0;
  migrate();
}
function save(){dirtyPending=true;if(save._t)clearTimeout(save._t);save._t=setTimeout(pushNow,600);}
async function pushNow(){
  if(savingInFlight||!dirtyPending)return;
  savingInFlight=true;dirtyPending=false;
  try{
    const nextRev=currentRev+1;
    const {data,error}=await sb.from('app_state')
      .update({data:DATA,rev:nextRev,updated_at:new Date().toISOString(),updated_by:(typeof myName==='function'&&myName())||'Unknown'})
      .eq('id',1).eq('rev',currentRev).select('rev,data');
    if(error){if(/JWT|auth|permission|token/i.test(error.message||''))showLogin('登录已过期,请重新登录');return;}
    if(!data||!data.length){
      // conflict: someone else already saved (rev moved) — reload their version
      const cur=await sb.from('app_state').select('rev,data').eq('id',1).single();
      if(cur.data){DATA=Array.isArray(cur.data.data)?cur.data.data:[];currentRev=cur.data.rev||0;migrate();render();toast('⚠️ 资料已被别人更新,已载入最新版 — 请重新确认你刚才的修改');}
      return;
    }
    currentRev=data[0].rev;
  }catch(e){/* offline — will retry on next save */}
  finally{savingInFlight=false;if(dirtyPending)pushNow();}
}
function startPolling(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    if(dirtyPending||savingInFlight||openId)return; // don't disrupt an edit in progress
    try{
      const {data,error}=await sb.from('app_state').select('rev,data').eq('id',1).single();
      if(error||!data)return;
      if((data.rev||0)!==currentRev){DATA=Array.isArray(data.data)?data.data:[];currentRev=data.rev||0;migrate();render();}
    }catch(e){}
  },7000);
}

function hideLogin(){const el=document.getElementById('loginOverlay');if(el)el.style.display='none';}
async function submitLogin(){
  const email=(((document.getElementById('loginEmail')||{}).value)||'').trim();
  const pass=((document.getElementById('loginPass')||{}).value)||'';
  if(!email||!pass){showLogin('请输入 email 和密码');return;}
  const btn=document.getElementById('loginBtn');if(btn){btn.disabled=true;btn.textContent='登录中…';}
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(btn){btn.disabled=false;btn.textContent='登录';}
  if(error){showLogin('登录失败:'+(error.message||'请检查 email 和密码'));return;}
  localStorage.setItem('pk_email',email);hideLogin();boot();
}
async function logout(){try{await sb.auth.signOut();}catch(e){}if(pollTimer)clearInterval(pollTimer);showLogin('已登出');}
async function boot(){
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(!session){showLogin('请登录');return;}
    await loadFromServer();
    let seeded=false;
    if(!DATA.length){DATA=seed();seeded=true;}
    applyAutoReminders();
    if(seeded)save();
    render();renderWhoAmI();startPolling();
  }catch(e){showLogin('无法载入资料:'+((e&&e.message)||'请稍后再试'));}
}

function pillHTML(st){const s=STATUS[st];return `<span class="pill" style="color:var(${s.c});background:var(${s.c}-bg)">${s.l}</span>`}
function needFollow(r){if(r.status!=='CONTACTED'||!r.contactedDate)return false;return daysUntil(r.contactedDate)*-1>=3}

// Overdue/expiring-soon detection, based on the Puspakom due date itself —
// independent of pipeline stage, so a vehicle stuck in any non-terminal
// status (not yet passed, not manually put on hold) still gets flagged once
// its legal due date is close or gone, even if nobody moved it along the
// Contacted/Confirmed/Booked pipeline in time.
const OVERDUE_EXEMPT=['PASS','ON_HOLD'];
function isOverdue(r){return !!r.puspakomDue&&!OVERDUE_EXEMPT.includes(r.status)&&daysUntil(r.puspakomDue)<0}
function isExpiringSoon(r){if(!r.puspakomDue||OVERDUE_EXEMPT.includes(r.status))return false;const d=daysUntil(r.puspakomDue);return d!=null&&d>=0&&d<=SOON_DAYS}
function overdueRows(){return DATA.filter(isOverdue).sort((a,b)=>(a.puspakomDue||'').localeCompare(b.puspakomDue||''))}
function expiringSoonRows(){return DATA.filter(isExpiringSoon).sort((a,b)=>(a.puspakomDue||'').localeCompare(b.puspakomDue||''))}
function vchipDue(r){const d=daysUntil(r.puspakomDue);const dtxt=d<0?(-d)+'d overdue':d+'d left';const col=d<0?'var(--s-fail)':'var(--s-rt)';
  return `<div class="vchip" onclick="openDetail('${r.id}')">
    <span class="rdot" style="background:${RUNNER_COLOR[r.runner]||'#6b7686'}"></span>
    <span class="pl">${r.plate}</span><span class="cmp">${r.company}</span><span class="dt" style="color:${col};font-weight:700">${dtxt}</span></div>`}
function alertBox(ic,lab,sub,rows,colorVar){
  return `<div class="rbox glass"><div class="rh"><div class="lab"><span class="ic">${ic}</span>${lab}</div><div class="cnt" style="color:var(${colorVar})">${rows.length}</div></div>

    ${rows.length?`<div class="veh-chips">${rows.map(vchipDue).join('')}</div>`:`<div class="none">${colorVar==='--s-fail'?'Nothing overdue 🎉':'Nothing expiring soon'}</div>`}</div>`;
}

const MONTH_SEEN_KEY='puspakom_month_reminder_seen';
const BACKUP_LAST_KEY='puspakom_last_backup_date';
const BACKUP_DISMISS_KEY='puspakom_backup_dismiss_date';
const BACKUP_REMIND_DAYS=3;
function renderBackupBanner(){
  const el=document.getElementById('backupBanner');
  const todayISO=toISO(new Date());
  if(localStorage.getItem(BACKUP_DISMISS_KEY)===todayISO){el.innerHTML='';return}
  const last=localStorage.getItem(BACKUP_LAST_KEY);
  const daysSince=last?Math.floor((parseISO(todayISO)-parseISO(last))/864e5):null;
  if(last&&daysSince<BACKUP_REMIND_DAYS){el.innerHTML='';return}
  const msg=last?`It's been <b>${daysSince} days</b> since your last backup — export a fresh copy so your data isn't only sitting in this browser.`
    :`You haven't exported a backup yet — do it now so your data isn't only sitting in this browser.`;
  el.innerHTML=`<div class="backup-alert">💾 <span>${msg}</span>
    <button class="go" onclick="exportData()">Export backup now</button>
    <button class="dismiss" onclick="dismissBackupBanner()" title="Remind me again tomorrow">✕</button></div>`;
}
function dismissBackupBanner(){localStorage.setItem(BACKUP_DISMISS_KEY,toISO(new Date()));document.getElementById('backupBanner').innerHTML=''}
function monthKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function renderMonthBanner(){
  const today=new Date();
  const thisMonth=monthKey(today);
  const seen=localStorage.getItem(MONTH_SEEN_KEY);
  const el=document.getElementById('monthBanner');
  if(seen===thisMonth){el.innerHTML='';return}
  const newq=DATA.filter(r=>r.status==='PENDING_CONTACT'&&r.isNew).length;
  const soon=DATA.filter(r=>r.status==='PENDING_CONTACT'&&!r.isNew&&(()=>{const d=daysUntil(r.puspakomDue);return d!=null&&d<=SOON_DAYS})()).length;
  el.innerHTML=`<div class="month-alert">🗓️ <span>It's a new month (<b>${MONFULL[today.getMonth()]} ${today.getFullYear()}</b>) — go through Pipeline and arrange this month's cases.${(newq||soon)?` You have <b>${newq}</b> new enquir${newq===1?'y':'ies'} and <b>${soon}</b> renewal${soon===1?'':'s'} due soon waiting.`:''}</span>
    <button class="go" onclick="dismissMonthBanner();switchView('pipe')">Go to Pipeline</button>
    <button class="dismiss" onclick="dismissMonthBanner()" title="Dismiss for this month">✕</button></div>`;
  notifyMonthStart(today);
}
function dismissMonthBanner(){localStorage.setItem(MONTH_SEEN_KEY,monthKey(new Date()));document.getElementById('monthBanner').innerHTML=''}
function notifyMonthStart(today){
  if(!('Notification' in window))return;
  const firedKey='puspakom_month_notif_fired';
  if(localStorage.getItem(firedKey)===monthKey(today))return;
  const fire=()=>{try{new Notification('Puspakom Dashboard',{body:MONFULL[today.getMonth()]+' — time to arrange this month\'s cases.'});}catch(e){}localStorage.setItem(firedKey,monthKey(today))};
  if(Notification.permission==='granted')fire();
  else if(Notification.permission!=='denied')Notification.requestPermission().then(p=>{if(p==='granted')fire()});
}

function inMonth(iso,y,m){if(!iso)return false;const d=parseISO(iso);return d.getFullYear()===y&&d.getMonth()===m}
function inYear(iso,y){if(!iso)return false;return parseISO(iso).getFullYear()===y}

function viewReport(){
  const t=new Date(),tISO=toISO(t),y=t.getFullYear(),m=t.getMonth();
  const nm=(m+1)%12, nmy=m===11?y+1:y;
  const sortI=a=>[...a].sort((x,z)=>(x.inspectionDate||'').localeCompare(z.inspectionDate||''));
  const today=sortI(DATA.filter(r=>r.inspectionDate===tISO));
  const thisM=sortI(DATA.filter(r=>inMonth(r.inspectionDate,y,m)));
  const nextM=sortI(DATA.filter(r=>inMonth(r.inspectionDate,nmy,nm)));
  const thisY=sortI(DATA.filter(r=>inYear(r.inspectionDate,y)));
  const overdue=overdueRows(),expSoon=expiringSoonRows();
  const alertBanner=overdue.length?`<div class="pipe-alert" style="color:var(--s-fail);background:var(--s-fail-bg);border-color:rgba(177,111,98,.3)">⚠ <span><b>${overdue.length}</b> vehicle${overdue.length>1?'s are':' is'} past their Puspakom due date and not yet passed — action needed.</span></div>`:'';
  return `<div class="rwrap">${alertBanner}<div class="rep-grid">
    ${alertBox('⚠','Overdue','Past Puspakom due date',overdue,'--s-fail')}
    ${alertBox('⏳','Expiring Soon','Due within '+SOON_DAYS+' days',expSoon,'--s-rt')}
    ${repBox('●',"Today's Inspections",fmt(tISO),today)}
    ${repBox('▣','This Month',MONFULL[m]+' '+y,thisM,'genMonthReport()')}
    ${repBox('▸','Next Month',MONFULL[nm]+' '+nmy,nextM)}
    ${repBox('◷','This Year',y+'',thisY,'genYearReport()')}
  </div>`+moneySection()+`</div>`;
}
function RM(n){return 'RM '+(+n||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2})}
function moneySection(){
  const y=new Date().getFullYear();
  const passed=DATA.filter(r=>r.status==='PASS');
  const testAll=DATA.reduce((s,r)=>s+(+r.testCardFee||0),0);
  const profitAll=passed.reduce((s,r)=>s+((+r.ourCharge||0)-(+r.testCardFee||0)-(+r.runnerCharge||0)),0);
  const yr=passed.filter(r=>inYear(r.inspectionDate,y));
  const RUN=['MR LEE','MR LOO','MR RAYMOND','MR PETER LIM'];
  const byRunner={};RUN.forEach(rn=>byRunner[rn]=0);
  yr.forEach(r=>{if(byRunner[r.runner]!=null)byRunner[r.runner]+=(+r.runnerCharge||0)+(+r.additionalAmount||0)});
  const runnerTotal=RUN.reduce((s,rn)=>s+byRunner[rn],0);
  return `<div class="money-head">Money · profit &amp; cost</div>
    <div class="money-grid">
      <div class="stat glass"><div class="slab">Test card spent · all-time</div><div class="sval">${RM(testAll)}</div><div class="snote">What we paid to book test cards</div></div>
      <div class="stat glass"><div class="slab">Net profit · all-time</div><div class="sval" style="color:var(--s-pass)">${RM(profitAll)}</div><div class="snote">Our charge − test card − runner (from ${passed.length} passed job${passed.length!==1?'s':''})</div></div>
    </div>
    <div class="runner-tbl glass">
      <div class="rt-head"><div class="rt-lab">Paid to runner · ${y}</div><div class="rt-total">${RM(runnerTotal)}</div></div>
      ${RUN.map(rn=>{const v=byRunner[rn];const pct=runnerTotal?Math.round(v/runnerTotal*100):0;
        return `<div class="rt-row"><span class="rt-dot" style="background:${RUNNER_COLOR[rn]}"></span><span class="rt-name">${rn}</span>
          <span class="rt-bar"><span style="width:${pct}%;background:${RUNNER_COLOR[rn]}"></span></span><span class="rt-amt">${RM(v)}</span></div>`}).join('')}
      <div class="snote" style="margin-top:10px">Labour + extra charges paid out this year (test card not included — we pay that direct).</div>
    </div>`;
}
function csvEsc(s){s=(s==null?'':String(s));if(/[",\n]/.test(s))s='"'+s.replace(/"/g,'""')+'"';return s}
function downloadCSV(filename,csvText){
  const blob=new Blob(['\ufeff'+csvText],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function reportRows(rows){
  let tCharge=0,tTest=0,tRunner=0,tProfit=0;
  const lines=rows.map(r=>{
    const charge=+r.ourCharge||0,test=+r.testCardFee||0,paid=(+r.runnerCharge||0)+(+r.additionalAmount||0),profit=charge-test-paid;
    tCharge+=charge;tTest+=test;tRunner+=paid;tProfit+=profit;
    return [r.company,r.plate,fmt(r.inspectionDate),r.runner||'',charge.toFixed(2),test.toFixed(2),paid.toFixed(2),profit.toFixed(2)];
  });
  return {lines,totals:{tCharge,tTest,tRunner,tProfit}};
}
const REP_HEAD=['Company','Vehicle No','Inspection Date','Runner','Our Charge (RM)','Test Card Fee (RM)','Paid to Runner (RM)','Profit (RM)'];
function genMonthReport(){
  const t=new Date(),y=t.getFullYear(),m=t.getMonth();
  const rows=DATA.filter(r=>inMonth(r.inspectionDate,y,m)).sort((a,b)=>(a.inspectionDate||'').localeCompare(b.inspectionDate||''));
  if(!rows.length){toast('This month has no inspections yet');return}
  const{lines,totals}=reportRows(rows);
  let csv=REP_HEAD.map(csvEsc).join(',')+'\n'+lines.map(l=>l.map(csvEsc).join(',')).join('\n');
  csv+='\n'+['TOTAL','','','',totals.tCharge.toFixed(2),totals.tTest.toFixed(2),totals.tRunner.toFixed(2),totals.tProfit.toFixed(2)].map(csvEsc).join(',');
  downloadCSV(`Puspakom_Report_${MONFULL[m]}_${y}.csv`,csv);
  toast('Report downloaded ✓');
}
function genYearReport(){
  const t=new Date(),y=t.getFullYear();
  const rows=DATA.filter(r=>inYear(r.inspectionDate,y)).sort((a,b)=>(a.inspectionDate||'').localeCompare(b.inspectionDate||''));
  if(!rows.length){toast('This year has no inspections yet');return}
  const{lines,totals}=reportRows(rows);
  let csv=`Total vehicles inspected in ${y},${rows.length}\n\n`;
  csv+=REP_HEAD.map(csvEsc).join(',')+'\n'+lines.map(l=>l.map(csvEsc).join(',')).join('\n');
  csv+='\n'+['TOTAL','','','',totals.tCharge.toFixed(2),totals.tTest.toFixed(2),totals.tRunner.toFixed(2),totals.tProfit.toFixed(2)].map(csvEsc).join(',');
  downloadCSV(`Puspakom_Report_${y}.csv`,csv);
  toast('Report downloaded ✓');
}

        <select class="stsel" onclick="stopRow(event)" onchange="setStatusDirect('${r.id}',this.value)">${STATUS_ORDER.map(k=>`<option value="${k}" style="color:#111" ${k===r.status?'selected':''}>${STATUS[k].l}</option>`).join('')}</select>
        <span class="stdisp" style="color:${r.status==='PASS'?'var(--s-pass-cy)':'var(--navy)'}">${STATUS[r.status]?STATUS[r.status].l:''}</span>
      </div>

  const card=r=>`<div class="card glass lift" onclick="openDetail('${r.id}')">
    <div class="cmain" style="grid-column:1/2"><h3>${r.plate}</h3><div class="co">${r.company}</div>
      <div class="cmeta"><span class="tag">Due <b>${fmt(r.puspakomDue)}</b></span><span class="tag">Insp <b>${fmt(r.inspectionDate)}</b></span>
      <span class="tag" style="color:${RUNNER_COLOR[r.runner]}">●&nbsp;<b style="color:${RUNNER_COLOR[r.runner]}">${r.runner}</b></span>

      <div class="stcell" style="margin-top:9px" onclick="stopRow(event)">
        <div class="stwrap">
          <select class="stsel" onclick="stopRow(event)" onchange="setStatusDirect('${r.id}',this.value)">${STATUS_ORDER.map(k=>`<option value="${k}" style="color:#111" ${k===r.status?'selected':''}>${STATUS[k].l}</option>`).join('')}</select>
          <span class="stdisp" style="color:${r.status==='PASS'?'var(--s-pass-cy)':'var(--navy)'}">${STATUS[r.status]?STATUS[r.status].l:''}</span>
        </div>
        ${STATUS_MSG[r.status]&&STATUS_MSG[r.status].length?`<button class="stcopy" title="Copy WhatsApp message" onclick="copyRowMsg(event,'${r.id}')">📋</button>`:''}</div></div></div>`;

  const row1=`<div class="filters">
    <select id="fY" onchange="setFlt()">${yearOptions()}</select>
    <select id="fM" onchange="setFlt()">${monthOptions()}</select>
    <div class="mnav"><button onclick="fltStep(-1)">‹</button><button onclick="fltStep(1)">›</button></div>
    <div class="co-filter"><input id="coFilterInput" type="text" placeholder="🔍 Filter by company name…" value="${fltCompany.replace(/"/g,'&quot;')}" oninput="setCoFilter(this.value)">${fltCompany?`<button class="clr" onclick="clearCoFilter()">✕</button>`:''}</div></div>`;
  const row2=`<div class="filters" style="margin-top:-6px">
    <div class="seg"><button class="${fltBasis==='due'?'on':''}" onclick="setBasis('due')">By Due Date</button><button class="${fltBasis==='insp'?'on':''}" onclick="setBasis('insp')">By Inspection</button></div>
    <button class="holdchip ${showHold?'on':''}" onclick="toggleHold()">⏸ On Hold${holdRows.length?' ('+holdRows.length+')':''}</button>
    <button class="holdchip ${showSales?'on':''}" style="color:var(--accent)${showSales?';background:var(--s-cb-bg)':''}" onclick="toggleSales()">🛟 Assist Sales${asr.length?' ('+asr.length+')':''}</button></div>`;

  if(fltCompany){
    const rows=applyMSort(DATA.filter(r=>r.status!=='ON_HOLD'&&matchCo(r)).sort((a,b)=>a.company.localeCompare(b.company)||(a.puspakomDue||'').localeCompare(b.puspakomDue||'')));
    const note=`<div class="hold-note">🔍 Showing all vehicles for companies matching “<b>${fltCompany}</b>” — across every month, ignoring the date filter above.</div>`;
    if(!rows.length)return row1+row2+note+emptyHTML('🔍','No matches','Try a shorter part of the company name.');
    return row1+row2+note+`<div class="tbl glass">${head}${rows.map(tr).join('')}</div><div class="tbl-cards">${rows.map(card).join('')}</div>`;
  }

  if(showSales){
    if(!asr.length)return row1+row2+emptyHTML('🛟','No sales hand-offs','Vehicles with insurance due within 3 months, or passed Puspakom needing road tax, appear here automatically.');
    return row1+row2+`<div class="hold-note" style="color:var(--accent);background:var(--s-cb-bg)">🛟 Hand these to the sales team — insurance renewal &amp; road tax. Tap ✓ once passed on.</div>
      <div class="list">${asr.sort((a,b)=>(a.insuranceDue||a.puspakomDue||'').localeCompare(b.insuranceDue||b.puspakomDue||'')).map(r=>{const ins=salesInsuranceFlag(r),rt=salesRoadtaxFlag(r);
        return `<div class="card glass"><div class="cmain" style="grid-column:1/2"><h3 onclick="openDetail('${r.id}')" style="cursor:pointer">${r.plate}</h3><div class="co">${r.company}${r.clientType?' · '+r.clientType:''}</div>
          <div class="cmeta">
            ${ins!=null?`<span class="tag" style="color:var(--s-pi)">📋 Insurance due ${fmt(r.insuranceDue)} · in ${ins}d</span>`:''}
            ${rt?`<span class="tag" style="color:var(--s-pass)">🚙 Road tax — Puspakom passed</span>`:''}</div>
          <div class="cmeta" style="margin-top:9px">
            ${ins!=null?`<button class="mini undo" onclick="dismissSales('${r.id}','ins')">Insurance handed ✓</button>`:''}
            ${rt?`<button class="mini undo" onclick="dismissSales('${r.id}','rt')">Road tax handed ✓</button>`:''}</div></div>
          <div class="cright"><span class="chev" style="cursor:pointer" onclick="openDetail('${r.id}')">›</span></div></div>`}).join('')}</div>`;
  }
  if(showHold){
    if(!holdRows.length)return row1+row2+emptyHTML('⏸','Nothing on hold','Set a vehicle\'s status to On Hold and it is parked here, out of the monthly list.');
    const hRows=applyMSort(holdRows);
    return row1+row2+`<div class="hold-note">⏸ Vehicles on hold — parked out of the monthly list until you change their status.</div>
      <div class="tbl glass">${head}${hRows.map(tr).join('')}</div><div class="tbl-cards">${hRows.map(card).join('')}</div>`;
  }

  let rows=DATA.filter(r=>{if(r.status==='ON_HOLD')return false;const dt=basisDate(r);if(!dt)return false;
    const d=parseISO(dt);if(d.getFullYear()!==fltYear)return false;return fltMonth==='all'||d.getMonth()===fltMonth});
  rows.sort((a,b)=>(basisDate(a)||'9').localeCompare(basisDate(b)||'9'));
  rows=applyMSort(rows);
  const word=fltBasis==='insp'?'inspected':'due';
  const count=`<span class="fcount">${rows.length} vehicle${rows.length!==1?'s':''} ${fltMonth==='all'?'in '+fltYear:word+' in '+MONFULL[fltMonth]+' '+fltYear}</span>`;
  const r1=row1.replace('</div>',count+'</div>');
  if(!rows.length)return r1+row2+emptyHTML('🚗','No vehicles for this period','Try another month, switch By&nbsp;Due / By&nbsp;Inspection, or add a new record.');
  return r1+row2+`<div class="tbl glass">${head}${rows.map(tr).join('')}</div><div class="tbl-cards">${rows.map(card).join('')}</div>`;
}

function viewPipeline(){
  const soon=r=>{const d=daysUntil(r.puspakomDue);return d!=null&&d<=SOON_DAYS};
  const newq=DATA.filter(r=>r.status==='PENDING_CONTACT'&&r.isNew);
  const dueSoon=DATA.filter(r=>r.status==='PENDING_CONTACT'&&!r.isNew&&soon(r));
  const later=DATA.filter(r=>r.status==='PENDING_CONTACT'&&!r.isNew&&!soon(r));
  const todayISO=toISO(new Date());
  const remindedToday=r=>r.lastReminderSentDate===todayISO;
  const sortRem=rows=>[...rows].sort((a,b)=>(remindedToday(a)?1:0)-(remindedToday(b)?1:0));
  const cols=[
    {key:'newq',title:'🆕 New Enquiry',dot:'var(--s-pc)',rows:newq},
    {key:'arrange',title:'Arrange · Due Soon',dot:'var(--accent)',rows:dueSoon},
    {key:'follow',title:'Need to Follow Up',dot:'var(--s-cc)',rows:DATA.filter(r=>r.status==='CONTACTED')},
    {key:'rem1',title:'Reminder · 1st',dot:'var(--s-rs)',rows:sortRem(DATA.filter(r=>r.status==='REMINDER_1'))},
    {key:'rem2',title:'Reminder · 2nd',dot:'var(--s-pi)',rows:sortRem(DATA.filter(r=>r.status==='REMINDER_2'))},
    {key:'pay',title:'Payment',dot:'var(--s-pass)',rows:DATA.filter(r=>r.status==='PASS'&&r.manualChecked&&!r.paymentSubmitted)}
  ];
  const rem=k=>k==='rem1'||k==='rem2';
  const kcard=(r,key)=>{const overdue=key==='follow'&&needFollow(r);
    const done=rem(key)&&remindedToday(r);
    const days=key==='newq'||key==='arrange'?daysUntil(r.puspakomDue):daysUntil(r.inspectionDate);
    const meta=key==='pay'?('RM '+((+r.runnerCharge||0)+(+r.additionalAmount||0)).toFixed(0)+' → runner')
      :(key==='newq'||key==='arrange')?(days!=null?(days>=0?'due in '+days+'d':(-days)+'d overdue'):'no due date')
      :(days!=null?(days>=0?days+'d to inspection':(-days)+'d overdue'):'');
    return `<div class="kcard ${overdue?'kover':''} ${done?'kdone':''}" onclick="openDetail('${r.id}')">
      ${key==='newq'?`<div class="knew-tag">NEW ENQUIRY</div>`:''}
      <div class="kc-plate">${r.plate}</div><div class="kc-co">${r.company}</div>
      <div class="kc-meta"><span style="color:${RUNNER_COLOR[r.runner]||'#6b7686'}">●&nbsp;${r.runner}</span>${meta?`<span>${meta}</span>`:''}</div>
      ${overdue?`<div class="kc-note" style="color:var(--s-fail)">⚠ follow-up overdue</div>`:''}
      ${rem(key)?(done?`<div class="kc-done-row"><span class="kc-done-tag">✓ Reminded today</span><button class="undo-b" onclick="undoReminded(event,'${r.id}')">undo</button></div>`
        :`<button class="qmsg-b wa" style="margin-top:9px;width:100%;padding:8px" onclick="event.stopPropagation();openWhatsApp('${r.id}','reminder')">💬 WhatsApp reminder → mark done</button>`):''}</div>`;};
  const alert=newq.length?`<div class="pipe-alert">🆕 <span><b>${newq.length}</b> new ${newq.length>1?'enquiries':'enquiry'} from sales waiting to be arranged — see the first column.</span></div>`:'';
  const laterNote=later.length?`<div class="pipe-later">📅 ${later.length} more upcoming renewal${later.length>1?'s':''} due later (over ${SOON_DAYS} days away) — parked in <b>Master Data</b>, they'll appear in “Due Soon” automatically as the date nears.</div>`:'';
  return alert+`<div class="kanban">${cols.map(c=>`<div class="kcol${c.key==='newq'&&c.rows.length?' knew':''}">
    <div class="kcol-h"><span class="kdot" style="background:${c.dot}"></span>${c.title}<span class="kcount${c.key==='newq'&&c.rows.length?' khot':''}">${c.rows.length}</span></div>
    <div class="kcol-b">${c.rows.length?c.rows.map(r=>kcard(r,c.key)).join(''):'<div class="kempty">—</div>'}</div></div>`).join('')}</div>`+laterNote;
}

function viewPay(){
  const ready=DATA.filter(r=>r.status==='PASS'&&r.manualChecked);
  const pend=ready.filter(r=>!r.paymentSubmitted).sort((a,b)=>(a.puspakomDue||'').localeCompare(b.puspakomDue||''));

  if(!ready.length)return emptyHTML('💲','No payments yet','After a vehicle passes and you confirm the manual check, it appears here.');
  const card=r=>{const total=(+r.runnerCharge||0)+(+r.additionalAmount||0);
    return `<div class="pay-card glass ${r.paymentSubmitted?'done':'lift'}" ${r.paymentSubmitted?'':`onclick="openDetail('${r.id}')"`}>
      <div class="pay-top"><div><h3>${r.plate}</h3><div class="co" style="font-size:12.5px;color:var(--ink-soft)">${r.company}</div></div>
        ${r.invoiceNo?`<span class="tag">Inv <b>${r.invoiceNo}</b></span>`:''}</div>
      <div class="pay-rows">
        <div class="r"><span>Runner labour (${r.runner})</span><b>RM ${(+r.runnerCharge||0).toFixed(2)}</b></div>
        ${r.additionalAmount>0?`<div class="r"><span>Extra (${r.additionalReason||'—'})</span><b>RM ${(+r.additionalAmount).toFixed(2)}</b></div>`:''}
        <div class="r total"><span>Total to runner</span><b>RM ${total.toFixed(2)}</b></div>
        ${r.testCardFee>0?`<div class="r" style="font-size:11px;color:var(--ink-faint)"><span>Test card RM ${(+r.testCardFee).toFixed(2)} — we pay direct, not to runner</span></div>`:''}</div>
      <div class="pay-actions" onclick="event.stopPropagation()">
        ${r.paymentSubmitted?`<span class="tag">Submitted · ${r.paymentTs}</span><button class="mini undo" onclick="togglePay('${r.id}',false)">Undo</button>`
          :(r.runnerInvoiceReceived?`<button class="mini go" onclick="togglePay('${r.id}',true)">Submit payment ✓</button>`
             :`<span class="warn-inv">⚠️ Runner bill not received yet — can't pay</span>`)}</div></div>`};
  return `<div class="list">${pend.map(card).join('')}${done.length?'<div style="font-size:12px;color:var(--ink-faint);margin:8px 2px 0;font-weight:600">Submitted ✓</div>':''}${done.map(card).join('')}</div>`;
}
function togglePay(id,v){const r=get(id);r.paymentSubmitted=v;r.paymentTs=v?nowStamp():'';save();render();toast(v?'Payment submitted':'Payment reverted')}
function emptyHTML(ic,t,s){return `<div class="empty glass"><div class="ic">${ic}</div><div style="font-weight:640;color:var(--navy)">${t}</div><div style="font-size:13px;margin-top:4px">${s}</div></div>`}

function viewCal(){
  const first=new Date(calYear,calMonth,1),start=new Date(first);start.setDate(first.getDate()-((first.getDay()+6)%7));
  const todayISO=toISO(new Date()),dows=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];let cells='';
  for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const iso=toISO(d);
    const out=d.getMonth()!==calMonth;const evts=DATA.filter(r=>r.inspectionDate===iso);
    let cls='dcell';if(out)cls+=' out';if(isWE(d))cls+=' we';if(isHol(iso))cls+=' hol';if(iso===todayISO)cls+=' today';
    cells+=`<div class="${cls}"><div class="dn">${d.getDate()}</div>${isHol(iso)?`<div class="holn">${HOLIDAYS[iso]}</div>`:''}
      ${evts.map(r=>`<div class="evt" style="background:${RUNNER_COLOR[r.runner]||'#6b7686'}" onclick="openDetail('${r.id}')" title="${r.company}">${r.plate}</div>`).join('')}</div>`}
  return `<div class="cal-h"><div class="mtitle">${MONFULL[calMonth]} ${calYear}</div>
      <div class="cal-nav"><button onclick="calNav(-1)">‹</button><button onclick="calToday()">Today</button><button onclick="calNav(1)">›</button></div></div>
    <div class="cal glass"><div class="cal-grid">${dows.map(d=>`<div class="dow">${d}</div>`).join('')}${cells}</div></div>
    <div class="cal-legend"><span><span class="dot" style="background:var(--s-fail)"></span>Public holiday</span>
      ${Object.keys(RUNNER_CAP).map(rn=>`<span><span class="dot" style="background:${RUNNER_COLOR[rn]}"></span>${rn} (max ${RUNNER_CAP[rn]}/day)</span>`).join('')}</div>`;
}
function calNav(n){calMonth+=n;if(calMonth<0){calMonth=11;calYear--}if(calMonth>11){calMonth=0;calYear++}render()}
function calToday(){const t=new Date();calMonth=t.getMonth();calYear=t.getFullYear();render()}

function openDetail(id){openId=id;renderSheet();showSheet()}
function showSheet(){document.getElementById('scrim').classList.add('show');document.getElementById('sheet').classList.add('show')}
function closeSheet(){document.getElementById('scrim').classList.remove('show');document.getElementById('sheet').classList.remove('show');openId=null}
function field(label,id,val,type,opts){val=val==null?'':val;
  if(type==='select')return `<div class="fld"><label>${label}</label><select id="${id}">${opts.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select></div>`;
  if(type==='textarea')return `<div class="fld"><label>${label}</label><textarea id="${id}">${val}</textarea></div>`;
  if(type==='date')return `<div class="fld"><label>${label}</label><div class="datewrap"><input id="${id}" type="date" lang="en-GB" value="${val}" oninput="this.nextElementSibling.textContent=fmtLong(this.value)"><span class="dd">${fmtLong(val)}</span></div></div>`;
  return `<div class="fld"><label>${label}</label><input id="${id}" type="${type||'text'}" value="${val}"></div>`}
function linkField(label,id,val){val=val||'';const open=/^https?:\/\//i.test(val)?`<a class="openlink" href="${val}" target="_blank" rel="noopener">Open ↗</a>`:'';
  return `<div class="fld"><label>${label}${open}</label><input id="${id}" type="text" value="${val}" placeholder="paste link…"></div>`}

       ${r.history&&r.history.length?`<details class="histwrap"><summary>Status history (${r.history.length})</summary><div class="hist">${r.history.slice().reverse().map(h=>`<div class="row"><span>${STATUS[h.s]?STATUS[h.s].l:h.s}</span><span>${h.t}</span></div>`).join('')}</div></details>`:''}</div>

       ${r.additionalAmount>0?`<label class="ck ${r.addedToQuotation?'done':''}" onclick="event.preventDefault();toggleCk('addedToQuotation')"><input type="checkbox" ${r.addedToQuotation?'checked':''}> Added extra charge into quotation (${r.quotationNo||'no number yet'})</label>`:''}</div>

     ${r.status==='FAIL'||r.status==='RETEST'?`<div class="sect"><label class="h">Retest details</label>
       ${field('Fail items','f_failItems',r.failItems,'textarea')}${field('Retest date','f_retestDate',r.retestDate,'date')}</div>`:''}

     <div class="sect"><label class="h">5 · Inspection Document Received?</label>
       <div class="checks">
         <label class="ck ${r.geranReceived?'done':''}" onclick="event.preventDefault();toggleCk('geranReceived')"><input type="checkbox" ${r.geranReceived?'checked':''}> Geran Original</label>
         <label class="ck ${r.discReceived?'done':''}" onclick="event.preventDefault();toggleCk('discReceived')"><input type="checkbox" ${r.discReceived?'checked':''}> Puspakom Disc</label>
         <label class="ck ${r.runnerInvoiceReceived?'done':''}" onclick="event.preventDefault();toggleCk('runnerInvoiceReceived')"><input type="checkbox" ${r.runnerInvoiceReceived?'checked':''}> Runner bill (needed before paying runner)</label></div>
       ${linkField('Puspakom report PDF','f_puspakomReportLink',r.puspakomReportLink)}
       <div class="import-rep">
         <button type="button" class="mini import-btn" onclick="openReportPaste()">📋 Paste Puspakom report text — auto-fills due date &amp; status</button>
         <div id="reportPasteBox" style="display:none;margin-top:8px">
           <textarea id="reportPasteText" rows="4" placeholder="Open the PDF, select all (Ctrl/Cmd+A), copy, and paste the whole report text here" style="width:100%;font:inherit;font-size:12.5px;border:1px solid var(--line);border-radius:10px;padding:9px;resize:vertical"></textarea>
           <button type="button" class="mini" style="background:var(--accent);color:#fff;margin-top:6px" onclick="applyPastedReport()">Apply report ✓</button>
         </div>
         ${r.reportDecisionNo?`<div class="hint" style="margin-top:6px">Last imported report No. Keputusan: <b>${r.reportDecisionNo}</b></div>`:''}
       </div>
       ${isPass?`<div style="border-top:1px solid var(--line);margin:14px 0 12px"></div>
         ${field('Next Puspakom due (auto)','f_renewalDue',r.renewalDue||computeRenewal(r),'date')}
         <div class="hint">+6 months from the <b>later</b> of the due date or the actual inspection date (no backdating). Early: 16-Jul due, inspect 1-Jul → 16-Jan. Late: 1-Jun due, pass 10-Jun → 10-Dec.</div>
         ${r.manualChecked
           ?`<div class="hint" style="color:var(--s-pass);font-weight:600;margin-top:8px">✅ Confirmed · added to Payment</div>`
              +(r.renewalCreated&&get(r.nextId)
                 ?`<div class="nextcyc">↻ Next-cycle record created: <b>${get(r.nextId).plate}</b> · due <b>${fmt(get(r.nextId).puspakomDue)}</b> · Pending Contact<br><a href="#" onclick="openNext(event,'${r.nextId}')">Open next record →</a> &nbsp;·&nbsp; <a href="#" onclick="removeNext(event,'${r.id}')">Remove</a></div>`
                 :`<div class="nextcyc">No next-cycle record. <a href="#" onclick="makeNext(event,'${r.id}')">Create next cycle →</a></div>`)
           :`<button class="bigbtn green" onclick="confirmPass()">Confirm done · add to Payment + create next cycle</button>`}`:''}</div>

     <div class="sect"><label class="h">6 · Drive Link (if needed)</label>
       ${linkField('Drive link','f_driveLink',r.driveLink)}</div>

     <button class="bigbtn ghost" onclick="saveSheet()">Save changes</button>
     <button class="bigbtn danger" style="margin-top:8px" onclick="delRecord('${r.id}')">Delete this record</button>
   </div>`;
}
function readSheet(){const r=get(openId);if(!r)return null;const g=id=>{const e=document.getElementById(id);return e?e.value:undefined};
  const lbl=g('f_status');const ns=STATUS_ORDER.find(k=>STATUS[k].l===lbl)||r.status;
  if(ns!==r.status){r.history=r.history||[];r.history.push({s:ns,t:nowStamp()});if(ns==='CONTACTED'&&!r.contactedDate)r.contactedDate=toISO(new Date());}
  r.status=ns;
  const map={f_company:'company',f_plate:'plate',f_puspakomDue:'puspakomDue',f_roadtaxDue:'roadtaxDue',f_insuranceDue:'insuranceDue',f_inspectionDate:'inspectionDate',
    f_clientType:'clientType',f_paymentStatus:'paymentStatus',f_picName:'picName',f_testCardLink:'testCardLink',f_puspakomReportLink:'puspakomReportLink',f_driveLink:'driveLink',
    f_b2Remark:'b2Remark',f_quotationNo:'quotationNo',f_invoiceNo:'invoiceNo',f_customerContact:'customerContact',f_pickupAddress:'pickupAddress',
    f_remark:'remark',f_additionalReason:'additionalReason',f_failItems:'failItems',f_retestDate:'retestDate',f_onHoldReason:'onHoldReason',f_renewalDue:'renewalDue'};
  for(const k in map){const v=g(k);if(v!==undefined)r[map[k]]=v}
  ['ourCharge','runnerCharge','testCardFee','additionalAmount'].forEach(f=>{const v=g('f_'+f);if(v!==undefined)r[f]=+v||0});
  const rn=g('f_runner'),it=g('f_inspectionType');if(rn)r.runner=rn;if(it)r.inspectionType=it;return r}
function saveSheet(){readSheet();save();renderSheet();render();toast('Saved')}
function useAuto(e){e.preventDefault();const r=readSheet();r.inspectionDate=calcInspection(r.puspakomDue,r.runner,r.id);save();renderSheet();render();toast('Applied suggested date')}
function toggleCk(f){const r=readSheet();r[f]=!r[f];save();renderSheet();render()}
function passDate(r){return (r.retestDate&&r.retestDate>(r.inspectionDate||''))?r.retestDate:(r.inspectionDate||'')}
function computeRenewal(r){const due=r.puspakomDue||'',pd=passDate(r);const anchor=(pd&&due)?(pd>due?pd:due):(due||pd);return anchor?addMonths(anchor,6):''}
function createNextCycle(r){
  const nd=r.renewalDue||computeRenewal(r);
  const n={id:uid(),company:r.company,plate:r.plate,puspakomDue:nd,roadtaxDue:r.roadtaxDue,insuranceDue:r.insuranceDue,runner:r.runner,inspectionType:r.inspectionType,
    clientType:r.clientType,puspakomOnly:r.puspakomOnly,picName:r.picName,paymentStatus:'Not set',testCardLink:'',puspakomReportLink:'',driveLink:'',
    salesInsuranceHandled:false,salesRoadtaxHandled:false,
    b2Remark:r.b2Remark,quotationNo:'',invoiceNo:'',ourCharge:r.ourCharge,runnerCharge:0,testCardFee:0,additionalAmount:0,additionalReason:'',
    renewalDue:'',geranReceived:false,discReceived:false,addedToQuotation:false,runnerInvoiceReceived:false,manualChecked:false,
    paymentSubmitted:false,paymentTs:'',failItems:'',retestDate:'',onHoldReason:'',customerContact:r.customerContact,pickupAddress:r.pickupAddress,
    remark:'',status:'PENDING_CONTACT',contactedDate:'',renewalCreated:false,nextId:'',prevId:r.id,demo:r.demo,history:[{s:'PENDING_CONTACT',t:nowStamp()}]};
  n.inspectionDate=calcInspection(nd,n.runner,n.id);DATA.push(n);return n.id}
function confirmPass(){const r=readSheet();r.manualChecked=true;if(!r.renewalDue)r.renewalDue=computeRenewal(r);
  if(!r.renewalCreated){r.nextId=createNextCycle(r);r.renewalCreated=true}save();renderSheet();render();toast('Added to Payment · next cycle due '+fmt(r.renewalDue))}
function makeNext(e){e.preventDefault();const r=readSheet();if(!r.renewalDue)r.renewalDue=computeRenewal(r);r.nextId=createNextCycle(r);r.renewalCreated=true;save();renderSheet();render();toast('Next cycle created')}
function removeNext(e,pid){e.preventDefault();const r=get(pid);if(r&&r.nextId){DATA=DATA.filter(x=>x.id!==r.nextId);r.nextId='';r.renewalCreated=false;save();renderSheet();render();toast('Next cycle removed')}}
function openNext(e,id){e.preventDefault();openDetail(id)}
function delRecord(id){if(!confirm('Delete this record?'))return;DATA=DATA.filter(r=>r.id!==id);save();closeSheet();render();toast('Deleted')}
document.addEventListener('change',e=>{if(!e.target)return;
  if(e.target.id==='f_status'){readSheet();save();renderSheet();render()}
  else if(e.target.id==='f_inspectionType'){readSheet();save();renderSheet()}
  else if(e.target.id==='f_additionalAmount'){readSheet();save();renderSheet()}});

function openNew(){
  document.getElementById('sheetContent').innerHTML=`<div class="sheet-h"><div><h2>New Record</h2><div class="sub">New job passed from sales — to arrange, or already arranged, just record it</div></div><button class="x" onclick="closeSheet()">✕</button></div>
   <div class="sheet-b"><div class="sect"><label class="h">New vehicle</label>
       ${field('Company name','n_company','')}
       <div class="grid2">${field('Vehicle no','n_plate','')}${field('Client type','n_clientType','Corporate','select',['Corporate','Individual','Government','Other'])}</div>
       <div class="grid3">${field('Puspakom due','n_puspakomDue','','date')}${field('Roadtax due','n_roadtaxDue','','date')}${field('Insurance due','n_insuranceDue','','date')}</div>
       ${field('Inspection type','n_inspectionType','BERKALA','select',ITYPES)}
       <label class="ck"><input type="checkbox" id="n_bookingOnly"> Booking only — customer inspects themselves (no runner needed)</label>
       <div class="grid2">${field('Quotation no','n_quotationNo','')}${field('Our charge (RM)','n_ourCharge','330','number')}</div>

  showSheet();document.getElementById('n_puspakomDue').addEventListener('change',previewNew);

function previewNew(){const due=document.getElementById('n_puspakomDue').value,bk=document.getElementById('n_bookingOnly').checked,p=document.getElementById('n_preview');
  if(due){const iso=calcInspection(due,bk?'BOOKING ONLY':'MR LEE','_new');p.innerHTML='Suggested inspection date: <b>'+fmt(iso)+'</b> (skips weekends · holidays)'}}
function addNew(){const g=id=>document.getElementById(id).value;

  const bk=document.getElementById('n_bookingOnly').checked;

    testCardLink:'',puspakomReportLink:'',driveLink:'',salesInsuranceHandled:false,salesRoadtaxHandled:false,runner:bk?'BOOKING ONLY':'MR LEE',inspectionType:g('n_inspectionType'),b2Remark:'',
    quotationNo:g('n_quotationNo').trim(),invoiceNo:'',ourCharge:+g('n_ourCharge')||330,runnerCharge:0,testCardFee:0,additionalAmount:0,
    additionalReason:'',renewalDue:'',geranReceived:false,discReceived:false,addedToQuotation:false,runnerInvoiceReceived:false,
    manualChecked:false,paymentSubmitted:false,paymentTs:'',failItems:'',retestDate:'',onHoldReason:'',customerContact:'',pickupAddress:'',
    remark:'',status:statusKey,contactedDate:statusKey!=='PENDING_CONTACT'?toISO(new Date()):'',renewalCreated:false,nextId:'',prevId:'',demo:false,isNew:true,history:[{s:statusKey,t:nowStamp()}]};
  r.inspectionDate=actualDate||calcInspection(r.puspakomDue,r.runner,r.id);DATA.push(r);save();closeSheet();switchView('master');toast('Added '+r.plate)}

function msgText(r,type){const ins=fmt(r.inspectionDate),due=fmt(r.puspakomDue);
  if(type==='arrange')return `Good Afternoon\n\nVehicle No : ${r.plate}   Puspakom Date : ${ins}\nPuspakom Due : ${due}\n\nPlease check and confirm the Puspakom date, please inform us if any adjustment needed. 😊\n\n⚠️ The reserve date only been hold for 3 day. Date will be rescheduled after 3 day.`;
  if(type==='followup')return `Good Afternoon ${r.company}\n\nMay I know is the Puspakom inspection date confirm?\nVehicle No : ${r.plate}   Puspakom Date : ${ins}\n\n⚠️ The reserve date only hold for 3 day. Kindly confirm so we can proceed booking. 🙏`;
  if(type==='confirm')return `Here is a Puspakom confirmation message.\n\nVehicle plate : ${r.plate}\nPuspakom date : ${ins}\n\n🌟 We will send reminder two days before the vehicle inspection.\n🌟 Once booking confirm, cannot cancel booking or change the slot.\n🌟 If you cancel booking or change the slot, no refund available. The cost must bear by yourself.`;
  if(type==='reminder')return `🔔 Reminder Message\n\nVehicle plate : ${r.plate}\nPuspakom Date : ${ins}\nRunner : ${r.runner}${RUNNER_PHONE[r.runner]?'  ('+RUNNER_PHONE[r.runner]+')':''}\n\nPuspakom inspection document needed as below :\n• Original Geran\n• Vehicle Key\n• The Vehicle\n• Safety triangle\n• SLD Letter\n\n‼️ There is no fixed time for runner to collect vehicle. Pls standby all the time for hand over the key.\n‼️ Runner no guarantee pass for anything.\n‼️ Make sure vehicle outside condition and all function is good.\n⚠️ Puspakom Fail will charge extra for Test Card Fee & Runner Second time Service Charge.`;
  if(type==='runner')return `${r.plate}  (${ins})\nRunner : ${r.runner}${RUNNER_PHONE[r.runner]?'  ('+RUNNER_PHONE[r.runner]+')':''}\nCollect contact : ${r.customerContact||'—'}\nAddress : ${r.pickupAddress||'—'}\n( Test card PDF attached )`;
  if(type==='retest')return `Vehicle plate : ${r.plate}\nPuspakom result : FAILED ❌\nFail item :\n${r.failItems||'—'}\n\nRetest date : ${fmt(r.retestDate)}`;
  if(type==='extra')return `【${r.plate}】inspection has incurred the following additional charges:\n\nReason: ${r.additionalReason||'—'} - RM ${(+r.additionalAmount||0).toFixed(2)}\n\nThe charges have already been added to the invoice. Kindly arrange the payment at your earliest convenience.\nThank you.`;
  return ''}
function quickMsg(id,type){if(openId===id&&document.getElementById('f_status')){readSheet();save()}
  const txt=msgText(get(id),type);
  if(type==='reminder'){const r=get(id);if(r){r.lastReminderSentDate=toISO(new Date());save();render();if(openId===id)renderSheet()}}
  navigator.clipboard.writeText(txt).then(()=>toast('Copied: '+(MSG_LABEL[type]||'message')+' — paste into WhatsApp')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('Copied: '+(MSG_LABEL[type]||'message'))})}

// --- WhatsApp automation ---------------------------------------------------
// Opens WhatsApp (desktop app if installed, otherwise WhatsApp Web) at the
// correct recipient's chat with the generated message already typed in. It does
// NOT auto-send — you review and press send yourself (WhatsApp also does not
// permit true auto-send), which keeps a human approval step for every message.
function waNumber(raw){
  let d=String(raw||'').replace(/\D/g,'');       // keep digits only
  if(!d)return'';
  if(d.startsWith('60'))return d;                 // already has MY country code
  if(d.startsWith('0'))return '60'+d.slice(1);    // local 0xx... -> 60xx...
  if(d.startsWith('1'))return '60'+d;             // bare mobile without leading 0
  return d;                                        // assume already international
}
function waRecipient(r,type){
  if(type==='runner')return {num:waNumber(RUNNER_PHONE[r.runner]),who:r.runner||'runner'};
  return {num:waNumber(r.customerContact),who:r.company||'customer'};
}
function openWhatsApp(id,type){
  if(openId===id&&document.getElementById('f_status')){readSheet();save()}
  const r=get(id);if(!r)return;
  const txt=msgText(r,type);
  const {num,who}=waRecipient(r,type);
  if(type==='reminder'){r.lastReminderSentDate=toISO(new Date());save();render();if(openId===id)renderSheet()}
  if(!num){
    if(navigator.clipboard)navigator.clipboard.writeText(txt).catch(()=>{});
    toast('No WhatsApp number saved for '+who+' — message copied instead. Add the number in the record, then try again.');
    return;
  }
  window.open('https://wa.me/'+num+'?text='+encodeURIComponent(txt),'_blank');
  toast('Opening WhatsApp → '+who+' ('+num+')');
}
function undoReminded(e,id){e.stopPropagation();const r=get(id);if(!r)return;r.lastReminderSentDate='';save();render();toast('Marked as not yet reminded')}

const NAME_KEY='puspakom_my_name';
const META_KEY='puspakom_data_meta';
function myName(){return localStorage.getItem(NAME_KEY)||''}
function askName(){const cur=myName();const n=prompt('Your name (so backups/imports show who touched the data):',cur);
  if(n&&n.trim()){localStorage.setItem(NAME_KEY,n.trim());renderWhoAmI()}return myName()}
function renderWhoAmI(){const el=document.getElementById('whoAmI');if(!el)return;
  el.textContent=myName()?('You: '+myName()):'Set your name';}
function bumpMeta(){localStorage.setItem(META_KEY,JSON.stringify({updatedAt:new Date().toISOString(),updatedBy:myName()||'Unknown'}))}
function getMeta(){try{return JSON.parse(localStorage.getItem(META_KEY))}catch(e){return null}}

function clearDemo(){if(!confirm('Clear all demo data?'))return;DATA=DATA.filter(r=>!r.demo);save();render();toast('Demo data cleared')}
function exportData(){
  if(!myName())askName();
  bumpMeta();
  const payload={__meta:getMeta(),records:DATA};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='puspakom_backup_'+toISO(new Date())+'.json';a.click();
  localStorage.setItem(BACKUP_LAST_KEY,toISO(new Date()));localStorage.removeItem(BACKUP_DISMISS_KEY);renderBackupBanner();
  toast('Backup exported'+(myName()?' as '+myName():''))}
function importData(e){const f=e.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{
    const d=JSON.parse(rd.result);
    let records,meta;
    if(Array.isArray(d)){records=d;meta=null}
    else if(d&&Array.isArray(d.records)){records=d.records;meta=d.__meta||null}
    else{toast('Wrong file format');return}
    const localMeta=getMeta();
    if(meta&&localMeta&&new Date(meta.updatedAt)<new Date(localMeta.updatedAt)){
      const ok=confirm('⚠️ This backup is from '+(meta.updatedBy||'someone')+' at '+new Date(meta.updatedAt).toLocaleString()+
        ', which is OLDER than the data already loaded here (last updated by '+(localMeta.updatedBy||'someone')+' at '+new Date(localMeta.updatedAt).toLocaleString()+
        ').\n\nImporting will overwrite the newer data. Continue anyway?');
      if(!ok){toast('Import cancelled');return}
    }else if(!meta&&localMeta){
      const ok=confirm('This backup has no version info (older-format file), so I can\'t tell if it\'s newer or older than what\'s already loaded.\n\nImporting will replace ALL current data. Continue?');
      if(!ok){toast('Import cancelled');return}
    }
    DATA=records;
    if(meta)localStorage.setItem(META_KEY,JSON.stringify(meta));else bumpMeta();
    save();render();toast('Imported '+records.length+' records')
  }catch(err){toast('Read failed')}};
  rd.readAsText(f);e.target.value=''}

/* ---- Puspakom report import via pasted text (offline, key data only — no PDF library needed) ---- */
const MONMY={JAN:0,FEB:1,MAC:2,MAR:2,APR:3,MEI:4,MAY:4,JUN:5,JUL:6,OGO:7,OGS:7,AUG:7,SEP:8,OKT:9,OCT:9,NOV:10,DIS:11,DEC:11};
function myDateToISO(str){const m=str.match(/(\d{1,2})[\s\-\/]([A-Za-z]{3,})[\s\-\/](\d{4})/);if(!m)return'';
  const mon=MONMY[m[2].slice(0,3).toUpperCase()];if(mon==null)return'';
  return m[3]+'-'+String(mon+1).padStart(2,'0')+'-'+String(+m[1]).padStart(2,'0')}
function parseReportText(text){
  text=text.replace(/\s+/g,' ');
  const plateM=text.match(/NO\.?\s*PENDAFTARAN\s*([A-Z0-9]+)/i);
  const dueM=text.match(/PERAKUAN PEMERIKSAAN SAH SEHINGGA\s*([0-9]{1,2}[\s\-\/][A-Za-z]{3,}[\s\-\/][0-9]{4})/i);
  const inspM=text.match(/(?<!AKHIR\s)(?<!SEMULA\s)TARIKH PEMERIKSAAN\s*([0-9]{1,2}[\s\-\/][A-Za-z]{3,}[\s\-\/][0-9]{4})/i);
  const decM=text.match(/NO\.?\s*KEPUTUSAN[:\s]*([A-Z]?\s?\d{6,})/i);
  const companyM=text.match(/PEMILIK[:\s]*([A-Z0-9 .,&\-]+?)(?:PEMBAWA|ALAMAT|$)/i);
  return{
    plate:plateM?plateM[1].trim():'',
    renewalDue:dueM?myDateToISO(dueM[1]):'',
    inspectionDate:inspM?myDateToISO(inspM[1]):'',
    decisionNo:decM?decM[1].replace(/\s+/g,''):'',
    company:companyM?companyM[1].trim():'',
    passed:!!dueM
  };
}
function openReportPaste(){
  const r=get(openId);if(!r){toast('Open a vehicle record first');return}
  const box=document.getElementById('reportPasteBox');
  box.style.display=box.style.display==='none'?'block':'none';
  if(box.style.display==='block')document.getElementById('reportPasteText').focus();
}
function applyPastedReport(){
  const r=get(openId);if(!r){toast('Open a vehicle record first');return}
  const text=document.getElementById('reportPasteText').value;
  if(!text.trim()){toast('Paste the report text first');return}
  const info=parseReportText(text);
  if(!info.plate&&!info.renewalDue){toast('⚠️ Could not find report data — check this is the full report text');return}
  if(info.plate&&info.plate.replace(/\s/g,'')!==r.plate.replace(/\s/g,'')){
    if(!confirm(`⚠️ This report is for plate "${info.plate}" but this record is "${r.plate}". Import anyway?`))return;
  }
  if(info.inspectionDate)r.inspectionDate=info.inspectionDate;
  if(info.decisionNo)r.reportDecisionNo=info.decisionNo;
  document.getElementById('reportPasteText').value='';
  document.getElementById('reportPasteBox').style.display='none';
  if(info.passed&&info.renewalDue){
    r.status='PASS';r.renewalDue=info.renewalDue;
    r.history=r.history||[];r.history.push({s:'PASS',t:nowStamp()});
    save();openId=r.id;renderSheet();
    confirmPass();
    toast('✅ Passed · due '+fmt(info.renewalDue)+' · added to Payment');
  }else{
    r.status='FAIL';
    r.history=r.history||[];r.history.push({s:'FAIL',t:nowStamp()});
    save();renderSheet();render();
    toast('⚠️ Report shows no pass — status set to Failed, please check');
  }
}
